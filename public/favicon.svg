<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1976d2" rx="15"/>

  <!-- Face outline (simplified) -->
  <circle cx="50" cy="45" r="25" fill="none" stroke="#ffffff" stroke-width="3"/>

  <!-- Eyes -->
  <circle cx="42" cy="40" r="3" fill="#ffffff"/>
  <circle cx="58" cy="40" r="3" fill="#ffffff"/>

  <!-- Smile -->
  <path d="M 38 52 Q 50 58 62 52" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

  <!-- Blur effect indicator (diagonal lines) -->
  <line x1="30" y1="25" x2="40" y2="25" stroke="#4fc3f7" stroke-width="2" opacity="0.7"/>
  <line x1="60" y1="25" x2="70" y2="25" stroke="#4fc3f7" stroke-width="2" opacity="0.7"/>
  <line x1="28" y1="30" x2="38" y2="30" stroke="#4fc3f7" stroke-width="2" opacity="0.7"/>
  <line x1="62" y1="30" x2="72" y2="30" stroke="#4fc3f7" stroke-width="2" opacity="0.7"/>

  <!-- Lock icon (privacy symbol) -->
  <rect x="72" y="75" width="18" height="12" rx="2" fill="#4caf50"/>
  <path d="M 75 75 L 75 70 Q 75 65 81 65 Q 87 65 87 70 L 87 75" fill="none" stroke="#4caf50" stroke-width="2.5"/>
  <circle cx="81" cy="81" r="2" fill="#ffffff"/>
</svg>
